    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 40px;
  }

  .logo-wrap {
    margin-bottom: 18px;
    animation: fadeDown 0.7s ease both;
  }

  .logo-wrap img {
    width: 130px;
    height: 130px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.25));
  }

  .login-card {
    background: rgba(255,255,255,0.97);
    border-radius: 4px;
    padding: 38px 42px 32px;
    width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    animation: fadeUp 0.7s ease 0.15s both;
  }

  .login-card h2 {
    font-size: 1.32rem;
    font-weight: 400;
    color: #333;
    margin-bottom: 22px;
  }

  .input-group {
    display: flex;
    align-items: center;
    border: 1px solid #ccc;
    border-radius: 3px;
    margin-bottom: 10px;
    background: #fff;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-group:focus-within { border-color: #1a3a8a; }

  .input-group .icon {
    padding: 0 12px;
    background: #f4f4f4;
    border-right: 1px solid #ccc;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 46px;
  }

  .input-group input {
    border: none;
    outline: none;
    padding: 12px 14px;
    font-size: 0.97rem;
    width: 100%;
    color: #444;
    background: transparent;
    font-family: 'Lato', sans-serif;
  }

  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 14px 0 18px;
    font-size: 0.9rem;
    color: #555;
  }

  .remember-row input[type="checkbox"] {
    accent-color: #1a3a8a;
    width: 15px;
    height: 15px;
    cursor: pointer;
  }

  .btn-login {
    width: 100%;
    background: #1a3a8a;
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 13px;
    font-size: 1rem;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-login:hover { background: #122d6e; }
  .btn-login:active { transform: scale(0.99); }

  .forgot-link {
    display: inline-block;
    margin-top: 16px;
    color: #1a3a8a;
    font-size: 0.9rem;
    text-decoration: none;
  }

  .forgot-link:hover { color: #122d6e; text-decoration: underline; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
